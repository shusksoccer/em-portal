<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">背景的期待 ── 前後比較</title>
  <desc id="d">背景期待が機能している場面と崩れた場面を左右に並べ、崩れた後の反応・回復の流れを示す。</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN',Meiryo,sans-serif; }</style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#f4f6f3"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="68" fill="#1a3f33"/>
  <text x="600" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#ffffff">背景的期待（Background Expectancies）</text>
  <text x="600" y="54" text-anchor="middle" font-size="15" fill="#90c4a8">「当然のこと」は崩れて初めて見える ── ガーフィンケルの違背実験より</text>

  <!-- Left panel: 期待通り -->
  <rect x="40" y="84" width="490" height="580" rx="12" fill="#e8f8f0" stroke="#3d9970" stroke-width="3"/>
  <rect x="40" y="84" width="490" height="50" rx="12" fill="#3d9970"/>
  <rect x="40" y="112" width="490" height="22" fill="#3d9970"/>
  <text x="285" y="118" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">① 期待通りの場面</text>

  <!-- Scene: normal greeting -->
  <rect x="68" y="148" width="434" height="130" rx="8" fill="#ffffff" stroke="#a8d8b8" stroke-width="1.5"/>
  <text x="285" y="172" text-anchor="middle" font-size="14" fill="#555">朝の教室（場面）</text>
  <text x="85" y="198" font-size="15" fill="#1a5a38">A: 「おはよう！」</text>
  <text x="85" y="226" font-size="15" fill="#2a6a8a">B: 「おはよう！」</text>
  <text x="85" y="254" font-size="13" fill="#888">──────────────────</text>
  <text x="85" y="272" font-size="12" fill="#3d9970">→ 挨拶が返ってくる（当たり前）</text>

  <text x="68" y="302" font-size="13" font-weight="bold" fill="#1a5a38">● 背景期待（見えない前提）：</text>
  <rect x="68" y="310" width="434" height="80" rx="6" fill="#f0fff8" stroke="#b8e8c8"/>
  <text x="85" y="332" font-size="13" fill="#333">・挨拶には挨拶で返す</text>
  <text x="85" y="352" font-size="13" fill="#333">・朝は互いに存在を認め合う</text>
  <text x="85" y="372" font-size="13" fill="#333">・この会話への参加が期待される</text>

  <text x="68" y="412" font-size="13" font-weight="bold" fill="#1a5a38">● 参加者の内的状態：</text>
  <rect x="68" y="420" width="434" height="60" rx="6" fill="#f0fff8" stroke="#b8e8c8"/>
  <text x="85" y="444" font-size="13" fill="#333">違和感なし。会話は自然に次へ続く。</text>
  <text x="85" y="464" font-size="12" fill="#888">期待は「あって当たり前」なので認識されない。</text>

  <text x="68" y="506" font-size="13" font-weight="bold" fill="#1a5a38">● EMの視点から見ると：</text>
  <rect x="68" y="514" width="434" height="80" rx="6" fill="#e0f4e8" stroke="#90d0a8"/>
  <text x="85" y="538" font-size="13" fill="#2a5a38">この「当たり前」を記述することが</text>
  <text x="85" y="558" font-size="13" fill="#2a5a38">EM研究の出発点。しかし見えにくい。</text>
  <text x="85" y="578" font-size="12" fill="#3d9970">→ だからこそ「崩す」と見えてくる。</text>

  <rect x="68" y="608" width="434" height="38" rx="6" fill="#3d9970"/>
  <text x="285" y="633" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">秩序は維持されている状態</text>

  <!-- Center: disruption arrow -->
  <text x="600" y="340" text-anchor="middle" font-size="28" fill="#c0392b">⚡</text>
  <text x="600" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">期待が</text>
  <text x="600" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">崩れる</text>
  <line x1="540" y1="360" x2="530" y2="360" stroke="#c0392b" stroke-width="2"/>
  <line x1="660" y1="360" x2="670" y2="360" stroke="#c0392b" stroke-width="2"/>

  <!-- Right panel: 期待が崩れる -->
  <rect x="670" y="84" width="490" height="580" rx="12" fill="#fdf0f0" stroke="#c0392b" stroke-width="3"/>
  <rect x="670" y="84" width="490" height="50" rx="12" fill="#c0392b"/>
  <rect x="670" y="112" width="490" height="22" fill="#c0392b"/>
  <text x="915" y="118" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">② 期待が崩れた場面</text>

  <!-- Scene: breached greeting -->
  <rect x="698" y="148" width="434" height="130" rx="8" fill="#ffffff" stroke="#e8a0a0" stroke-width="1.5"/>
  <text x="915" y="172" text-anchor="middle" font-size="14" fill="#555">朝の教室（場面）</text>
  <text x="715" y="198" font-size="15" fill="#1a5a38">A: 「おはよう！」</text>
  <text x="715" y="226" font-size="15" fill="#c0392b">B: （黙って別の方向を向く）</text>
  <text x="715" y="254" font-size="13" fill="#888">──────────────────</text>
  <text x="715" y="272" font-size="12" fill="#c0392b">→ 挨拶が返ってこない（期待の崩れ）</text>

  <text x="698" y="302" font-size="13" font-weight="bold" fill="#8a1a1a">● 参加者の反応：</text>
  <rect x="698" y="310" width="434" height="80" rx="6" fill="#fff8f8" stroke="#e8a0a0"/>
  <text x="715" y="332" font-size="13" fill="#333">困惑：「どうしたんだろう…」</text>
  <text x="715" y="352" font-size="13" fill="#333">不快：「なんで無視するの？」</text>
  <text x="715" y="372" font-size="13" fill="#333">行動：再度声をかける（修復開始）</text>

  <!-- Recovery flow -->
  <text x="698" y="412" font-size="13" font-weight="bold" fill="#8a1a1a">● 秩序の回復プロセス：</text>
  <rect x="698" y="420" width="434" height="100" rx="6" fill="#fff8f8" stroke="#e8a0a0"/>

  <!-- Step boxes for recovery -->
  <rect x="715" y="430" width="120" height="32" rx="4" fill="#c0392b"/>
  <text x="775" y="451" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">①期待の崩れ</text>
  <line x1="835" y1="446" x2="848" y2="446" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="850" y="430" width="100" height="32" rx="4" fill="#e08030"/>
  <text x="900" y="451" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">②問題化</text>
  <line x1="950" y1="446" x2="963" y2="446" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="965" y="430" width="100" height="32" rx="4" fill="#3d9970"/>
  <text x="1015" y="451" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">③秩序回復</text>
  <text x="715" y="488" font-size="12" fill="#555">A:「聞こえてる？」（修復開始）</text>
  <text x="715" y="506" font-size="12" fill="#555">B:「あ、ごめん。おはよう」（回復）</text>

  <text x="698" y="545" font-size="13" font-weight="bold" fill="#8a1a1a">● EMが可視化するもの：</text>
  <rect x="698" y="553" width="434" height="80" rx="6" fill="#fde8e8" stroke="#e8a0a0"/>
  <text x="715" y="577" font-size="13" fill="#8a1a1a">B の無反応により、Aの困惑・修復行動が</text>
  <text x="715" y="597" font-size="13" fill="#8a1a1a">引き出された。これが背景期待の証拠。</text>
  <text x="715" y="617" font-size="12" fill="#c0392b">→「崩れ」が期待を可視化させる。</text>

  <rect x="698" y="608" width="434" height="38" rx="6" fill="#c0392b"/>
  <text x="915" y="633" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">秩序の乱れ → 修復 → 秩序の回復</text>

  <!-- Bottom footer -->
  <rect x="0" y="676" width="1200" height="44" fill="#1a3f33"/>
  <text x="600" y="702" text-anchor="middle" font-size="14" fill="#90c4a8">背景期待は「ある」ときは見えず、「崩れた」ときに初めて姿を現す。これがガーフィンケルの方法論的洞察。</text>
</svg>
