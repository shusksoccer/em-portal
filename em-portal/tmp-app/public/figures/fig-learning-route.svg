<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">探究サイクル ── 4ステップの循環</title>
  <desc id="d">EM探究の4ステップ（観察する・記述する・分析する・まとめる）が循環することを示す図。</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN',Meiryo,sans-serif; }</style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#1a3f33"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#3d9970"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#4a7bc4"/>
    </marker>
    <marker id="arr-p" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#8e5cb8"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#e08030"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#f4f6f3"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="68" fill="#1a3f33"/>
  <text x="600" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#ffffff">探究サイクル ── 観察から発表への4ステップ</text>
  <text x="600" y="54" text-anchor="middle" font-size="15" fill="#90c4a8">直線ではなく循環。どのステップからでも再出発できる。</text>

  <!-- Outer circle path (for arrow guidance) -->
  <circle cx="600" cy="395" r="210" fill="none" stroke="#d0e8d8" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- Inner circle -->
  <circle cx="600" cy="395" r="90" fill="#1a3f33"/>
  <text x="600" y="383" text-anchor="middle" font-size="18" font-weight="bold" fill="#90c4a8">探究</text>
  <text x="600" y="407" text-anchor="middle" font-size="18" font-weight="bold" fill="#90c4a8">サイクル</text>

  <!-- Step 1: 観察する (TOP, green) -->
  <rect x="480" y="84" width="240" height="110" rx="12" fill="#3d9970" stroke="#2a7050" stroke-width="2"/>
  <text x="600" y="118" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">観察する</text>
  <text x="600" y="144" text-anchor="middle" font-size="14" fill="#c8f0dc">L1–L2</text>
  <text x="600" y="164" text-anchor="middle" font-size="13" fill="#d8ffe8">フィールドに出て、</text>
  <text x="600" y="182" text-anchor="middle" font-size="13" fill="#d8ffe8">事実を5W1Hで記録する</text>

  <!-- Arrow: 観察→記述 (top → right) -->
  <path d="M790,260 Q860,290 852,362" fill="none" stroke="#4a7bc4" stroke-width="3" marker-end="url(#arr-b)"/>
  <text x="870" y="310" font-size="13" fill="#4a7bc4" font-weight="bold">転記へ</text>

  <!-- Step 2: 記述する (RIGHT, blue) -->
  <rect x="860" y="340" width="240" height="110" rx="12" fill="#4a7bc4" stroke="#3a6aa4" stroke-width="2"/>
  <text x="980" y="374" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">記述する</text>
  <text x="980" y="400" text-anchor="middle" font-size="14" fill="#c0d8f8">L3</text>
  <text x="980" y="420" text-anchor="middle" font-size="13" fill="#d8ecff">ジェファーソン記法で</text>
  <text x="980" y="438" text-anchor="middle" font-size="13" fill="#d8ecff">トランスクリプトを作る</text>

  <!-- Arrow: 記述→分析 (right → bottom) -->
  <path d="M852,458 Q860,540 790,560" fill="none" stroke="#8e5cb8" stroke-width="3" marker-end="url(#arr-p)"/>
  <text x="876" y="520" font-size="13" fill="#8e5cb8" font-weight="bold">分析へ</text>

  <!-- Step 3: 分析する (BOTTOM, purple) -->
  <rect x="480" y="526" width="240" height="110" rx="12" fill="#8e5cb8" stroke="#7a4aa0" stroke-width="2"/>
  <text x="600" y="560" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">分析する</text>
  <text x="600" y="586" text-anchor="middle" font-size="14" fill="#d8c8f8">L4–L5</text>
  <text x="600" y="606" text-anchor="middle" font-size="13" fill="#ece8ff">CA概念で行番号指定し、</text>
  <text x="600" y="624" text-anchor="middle" font-size="13" fill="#ece8ff">パターン・ルールを読む</text>

  <!-- Arrow: 分析→まとめ (bottom → left) -->
  <path d="M410,560 Q342,540 348,458" fill="none" stroke="#e08030" stroke-width="3" marker-end="url(#arr-o)"/>
  <text x="298" y="520" font-size="13" fill="#e08030" font-weight="bold">まとめへ</text>

  <!-- Step 4: まとめる (LEFT, orange) -->
  <rect x="100" y="340" width="240" height="110" rx="12" fill="#e08030" stroke="#c06a10" stroke-width="2"/>
  <text x="220" y="374" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">まとめる</text>
  <text x="220" y="400" text-anchor="middle" font-size="14" fill="#ffe8c0">L6</text>
  <text x="220" y="420" text-anchor="middle" font-size="13" fill="#fff8e8">6要素の発表計画を作り、</text>
  <text x="220" y="438" text-anchor="middle" font-size="13" fill="#fff8e8">発表・提出する</text>

  <!-- Arrow: まとめ→観察 (left → top) - the cycle continues -->
  <path d="M348,362 Q342,290 410,260" fill="none" stroke="#3d9970" stroke-width="3" marker-end="url(#arr-g)"/>
  <text x="270" y="310" font-size="13" fill="#3d9970" font-weight="bold">次の問いへ</text>

  <!-- Arrows connecting steps to center labels -->
  <!-- Diagonal arrows from outer nodes toward center -->

  <!-- Lesson labels on arrows -->

  <!-- Bottom detail boxes -->
  <rect x="40" y="660" width="260" height="50" rx="6" fill="#3d9970" opacity="0.15" stroke="#3d9970" stroke-width="1.5"/>
  <text x="170" y="682" text-anchor="middle" font-size="12" fill="#1a5a38" font-weight="bold">観察ツール</text>
  <text x="170" y="700" text-anchor="middle" font-size="11" fill="#1a5a38">フィールドノート・観察ログ</text>

  <rect x="320" y="660" width="260" height="50" rx="6" fill="#4a7bc4" opacity="0.15" stroke="#4a7bc4" stroke-width="1.5"/>
  <text x="450" y="682" text-anchor="middle" font-size="12" fill="#1a3a8a" font-weight="bold">記述ツール</text>
  <text x="450" y="700" text-anchor="middle" font-size="11" fill="#1a3a8a">転記テンプレート・Jefferson記法</text>

  <rect x="600" y="660" width="260" height="50" rx="6" fill="#8e5cb8" opacity="0.15" stroke="#8e5cb8" stroke-width="1.5"/>
  <text x="730" y="682" text-anchor="middle" font-size="12" fill="#4a1a7a" font-weight="bold">分析ツール</text>
  <text x="730" y="700" text-anchor="middle" font-size="11" fill="#4a1a7a">CA概念・MCA・ブリーチング分析</text>

  <rect x="880" y="660" width="280" height="50" rx="6" fill="#e08030" opacity="0.15" stroke="#e08030" stroke-width="1.5"/>
  <text x="1020" y="682" text-anchor="middle" font-size="12" fill="#6a3a0a" font-weight="bold">まとめツール</text>
  <text x="1020" y="700" text-anchor="middle" font-size="11" fill="#6a3a0a">発表構成マップ・6要素チェックリスト</text>
</svg>
