<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">観察ログ記入見本</title>
  <desc id="d">フィールド観察時に使う記録用紙の記入例。時刻・話者・発話・身体動作・気づきの5列構成。</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN',Meiryo,sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#f4f6f3"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="68" fill="#1a3f33"/>
  <text x="600" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#ffffff">観察ログ ── 記入見本</text>
  <text x="600" y="54" text-anchor="middle" font-size="15" fill="#90c4a8">「何を・どう書くか」を列ごとに確認する。解釈は最後の列にまとめる。</text>

  <!-- Meta info strip -->
  <rect x="40" y="80" width="1120" height="44" rx="6" fill="#ffffff" stroke="#b8d0c0" stroke-width="1.5"/>
  <text x="60" y="108" font-size="13" fill="#555">場所：</text>
  <rect x="100" y="88" width="180" height="28" rx="3" fill="#f0f7f0" stroke="#b8d0c0"/>
  <text x="190" y="108" text-anchor="middle" font-size="13" fill="#333">学校の廊下</text>
  <text x="300" y="108" font-size="13" fill="#555">日時：</text>
  <rect x="340" y="88" width="200" height="28" rx="3" fill="#f0f7f0" stroke="#b8d0c0"/>
  <text x="440" y="108" text-anchor="middle" font-size="13" fill="#333">○月○日 昼休み 12:30–</text>
  <text x="560" y="108" font-size="13" fill="#555">観察者：</text>
  <rect x="618" y="88" width="120" height="28" rx="3" fill="#f0f7f0" stroke="#b8d0c0"/>
  <text x="678" y="108" text-anchor="middle" font-size="13" fill="#333">田中○○</text>
  <text x="758" y="108" font-size="13" fill="#555">参加者数：</text>
  <rect x="840" y="88" width="60" height="28" rx="3" fill="#f0f7f0" stroke="#b8d0c0"/>
  <text x="870" y="108" text-anchor="middle" font-size="13" fill="#333">3名</text>

  <!-- Table frame -->
  <rect x="40" y="136" width="1120" height="460" rx="6" fill="#ffffff" stroke="#b8d0c0" stroke-width="2"/>

  <!-- Table header row -->
  <rect x="40" y="136" width="1120" height="44" rx="6" fill="#1a3f33"/>
  <rect x="40" y="158" width="1120" height="22" fill="#1a3f33"/>

  <!-- Column widths: 80 | 80 | 340 | 280 | 340 = 1120 -->
  <!-- Col dividers in header -->
  <line x1="120" y1="136" x2="120" y2="596" stroke="#c0d8c0" stroke-width="1"/>
  <line x1="200" y1="136" x2="200" y2="596" stroke="#c0d8c0" stroke-width="1"/>
  <line x1="540" y1="136" x2="540" y2="596" stroke="#c0d8c0" stroke-width="1"/>
  <line x1="820" y1="136" x2="820" y2="596" stroke="#c0d8c0" stroke-width="1"/>

  <!-- Header labels -->
  <text x="80" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">時刻</text>
  <text x="160" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">話者</text>
  <text x="370" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">発話・行為（事実のみ）</text>
  <text x="680" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">身体動作・視線・位置</text>
  <text x="980" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">気づき・メモ（解釈はここへ）</text>

  <!-- Row 1 -->
  <rect x="41" y="180" width="1118" height="70" fill="#f8faf8"/>
  <text x="80" y="208" text-anchor="middle" font-size="13" fill="#333">12:31</text>
  <text x="80" y="226" text-anchor="middle" font-size="11" fill="#888">（+0秒）</text>
  <text x="160" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a6a8a">A</text>
  <text x="210" y="206" font-size="13" fill="#333">「ちょっといい？」と声をかける</text>
  <text x="210" y="224" font-size="12" fill="#888">（通常の音量、文末上昇）</text>
  <text x="550" y="206" font-size="13" fill="#333">BのそばでBの顔方向を向く</text>
  <text x="550" y="224" font-size="12" fill="#888">（距離 約50cm）</text>
  <text x="830" y="206" font-size="12" fill="#3d7050">→「許可要求」の隣接ペア前項か？</text>
  <text x="830" y="224" font-size="11" fill="#888">注：誰への発話か確認要</text>

  <!-- Row divider -->
  <line x1="40" y1="250" x2="1160" y2="250" stroke="#d8e8d8" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="41" y="250" width="1118" height="70" fill="#ffffff"/>
  <text x="80" y="278" text-anchor="middle" font-size="13" fill="#333">12:31</text>
  <text x="80" y="296" text-anchor="middle" font-size="11" fill="#888">（+2秒）</text>
  <text x="160" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a4a2a">B</text>
  <text x="210" y="276" font-size="13" fill="#333">無発話（0.8秒）</text>
  <text x="210" y="294" font-size="12" fill="#888">（スマホの画面を見たまま）</text>
  <text x="550" y="276" font-size="13" fill="#333">視線はスマホへ。顔を上げない。</text>
  <text x="550" y="294" font-size="12" fill="#888">体はAの方向に向いていない</text>
  <text x="830" y="276" font-size="12" fill="#3d7050">→ 応答不在（dispreferred response）</text>
  <text x="830" y="294" font-size="11" fill="#888">背景期待（質問→応答）が崩れた</text>

  <!-- Row divider -->
  <line x1="40" y1="320" x2="1160" y2="320" stroke="#d8e8d8" stroke-width="1"/>

  <!-- Row 3 -->
  <rect x="41" y="320" width="1118" height="70" fill="#f8faf8"/>
  <text x="80" y="348" text-anchor="middle" font-size="13" fill="#333">12:31</text>
  <text x="80" y="366" text-anchor="middle" font-size="11" fill="#888">（+4秒）</text>
  <text x="160" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a6a8a">A</text>
  <text x="210" y="346" font-size="13" fill="#333">「聞こえてる？」（声量やや上がる）</text>
  <text x="210" y="364" font-size="12" fill="#888">（文末上昇↑）</text>
  <text x="550" y="346" font-size="13" fill="#333">Bに向かって少し前傾み</text>
  <text x="550" y="364" font-size="12" fill="#888">頭を傾ける（首かしげ）</text>
  <text x="830" y="346" font-size="12" fill="#3d7050">→ 修復開始（repair initiation）</text>
  <text x="830" y="364" font-size="11" fill="#888">応答なしを問題化する発話</text>

  <!-- Row divider -->
  <line x1="40" y1="390" x2="1160" y2="390" stroke="#d8e8d8" stroke-width="1"/>

  <!-- Row 4 -->
  <rect x="41" y="390" width="1118" height="70" fill="#ffffff"/>
  <text x="80" y="418" text-anchor="middle" font-size="13" fill="#333">12:31</text>
  <text x="80" y="436" text-anchor="middle" font-size="11" fill="#888">（+6秒）</text>
  <text x="160" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a4a2a">B</text>
  <text x="210" y="416" font-size="13" fill="#333">「あ、ごめん。いいよ」</text>
  <text x="210" y="434" font-size="12" fill="#888">（スマホをポケットへ）</text>
  <text x="550" y="416" font-size="13" fill="#333">顔をAに向け直す。</text>
  <text x="550" y="434" font-size="12" fill="#888">スマホを机に置く（身体も向き変え）</text>
  <text x="830" y="416" font-size="12" fill="#3d7050">→ 謝罪＋承諾で秩序回復</text>
  <text x="830" y="434" font-size="11" fill="#888">隣接ペア（質問→承諾）完成</text>

  <!-- Row divider -->
  <line x1="40" y1="460" x2="1160" y2="460" stroke="#d8e8d8" stroke-width="1"/>

  <!-- Empty row template -->
  <rect x="41" y="460" width="1118" height="70" fill="#fafcfa"/>
  <text x="80" y="500" text-anchor="middle" font-size="11" fill="#ccc">12:__</text>
  <text x="160" y="500" text-anchor="middle" font-size="11" fill="#ccc">__</text>
  <text x="370" y="500" text-anchor="middle" font-size="12" fill="#ccc">（ここに発話・行為を事実として記録）</text>
  <text x="680" y="500" text-anchor="middle" font-size="12" fill="#ccc">（ここに身体・視線を記録）</text>
  <text x="980" y="500" text-anchor="middle" font-size="12" fill="#ccc">（気づき・問い・概念ラベル）</text>
  <line x1="40" y1="530" x2="1160" y2="530" stroke="#d8e8d8" stroke-width="1"/>

  <!-- Empty row 2 -->
  <rect x="41" y="530" width="1118" height="66" fill="#fafcfa"/>

  <!-- Tip box -->
  <rect x="40" y="608" width="1120" height="80" rx="8" fill="#1a3f33"/>
  <text x="60" y="634" font-size="13" font-weight="bold" fill="#90c4a8">記録のポイント：</text>
  <text x="60" y="656" font-size="13" fill="#d4ecd8">① 「事実のみ」列には推測・感想を書かない。②「気づき」列に解釈・仮説をまとめる。③ 間（ポーズ）は秒数で。</text>
  <text x="60" y="676" font-size="12" fill="#90c4a8">④ 行番号を振っておくと、後の転記・分析でデータを引用しやすくなる。</text>
</svg>
