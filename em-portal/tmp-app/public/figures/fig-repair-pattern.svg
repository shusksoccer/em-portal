<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">修復パターン 2×2マトリクス</title>
  <desc id="d">会話修復を「開始者（自己／他者）」と「修復者（自己／他者）」の2軸で4類型に分類した図。</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN',Meiryo,sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#f4f6f3"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="68" fill="#1a3f33"/>
  <text x="600" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#ffffff">修復パターン ── 誰が問題を見つけ、誰が直すか</text>
  <text x="600" y="54" text-anchor="middle" font-size="15" fill="#90c4a8">会話修復（Repair）は「開始者」と「修復者」の組み合わせで4類型に分かれる</text>

  <!-- Axis labels -->
  <!-- Y-axis: 修復の開始者 -->
  <text x="72" y="390" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3f33" transform="rotate(-90,72,390)">修復の開始者（誰が問題に気づくか）</text>
  <text x="108" y="278" text-anchor="middle" font-size="15" fill="#2a6a8a" font-weight="bold">自己</text>
  <text x="108" y="532" text-anchor="middle" font-size="15" fill="#8a4a2a" font-weight="bold">他者</text>

  <!-- X-axis: 修復の実行者 -->
  <text x="600" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3f33">修復の実行者（誰が直すか）</text>
  <text x="380" y="124" text-anchor="middle" font-size="15" fill="#2a6a8a" font-weight="bold">自己</text>
  <text x="820" y="124" text-anchor="middle" font-size="15" fill="#8a4a2a" font-weight="bold">他者</text>

  <!-- Grid lines -->
  <line x1="138" y1="135" x2="1160" y2="135" stroke="#ccc" stroke-width="2"/>
  <line x1="138" y1="400" x2="1160" y2="400" stroke="#ccc" stroke-width="2"/>
  <line x1="138" y1="665" x2="1160" y2="665" stroke="#ccc" stroke-width="2"/>
  <line x1="138" y1="135" x2="138" y2="665" stroke="#ccc" stroke-width="2"/>
  <line x1="600" y1="135" x2="600" y2="665" stroke="#ccc" stroke-width="2"/>
  <line x1="1160" y1="135" x2="1160" y2="665" stroke="#ccc" stroke-width="2"/>

  <!-- Cell ① SS: 自己開始・自己修復 (top-left) - most preferred -->
  <rect x="140" y="137" width="458" height="261" fill="#e8f8f0"/>
  <text x="180" y="168" font-size="13" fill="#3d9970">① 自己開始・自己修復</text>
  <rect x="164" y="176" width="88" height="26" rx="4" fill="#3d9970"/>
  <text x="208" y="195" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">最優先</text>

  <text x="164" y="232" font-size="13" font-weight="bold" fill="#1a5a38">定義：</text>
  <text x="164" y="252" font-size="13" fill="#333">問題を起こした本人が、</text>
  <text x="164" y="270" font-size="13" fill="#333">自分で気づいて自分で直す</text>

  <text x="164" y="308" font-size="13" font-weight="bold" fill="#1a5a38">例：</text>
  <rect x="164" y="316" width="400" height="60" rx="6" fill="#f0fff6" stroke="#90d0a8"/>
  <text x="180" y="336" font-size="12" fill="#2a5a3c">A:「昨日ね、あ違う、一昨日か」</text>
  <text x="180" y="356" font-size="12" fill="#888">    ↑ Aが誤りに気づき直す（「あ違う」）</text>
  <text x="180" y="372" font-size="12" fill="#3d9970">→ 会話は自然に続く。最もスムーズ。</text>

  <!-- Cell ② SO: 自己開始・他者修復 (top-right) -->
  <rect x="602" y="137" width="556" height="261" fill="#e8f0f8"/>
  <text x="642" y="168" font-size="13" fill="#4a7bc4">② 自己開始・他者修復</text>
  <rect x="642" y="176" width="64" height="26" rx="4" fill="#4a7bc4"/>
  <text x="674" y="195" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">優先②</text>

  <text x="642" y="232" font-size="13" font-weight="bold" fill="#1a3a8a">定義：</text>
  <text x="642" y="252" font-size="13" fill="#333">問題を起こした本人が修復を</text>
  <text x="642" y="270" font-size="13" fill="#333">「開始」し、聞き手が補って直す</text>

  <text x="642" y="308" font-size="13" font-weight="bold" fill="#1a3a8a">例：</text>
  <rect x="642" y="316" width="490" height="60" rx="6" fill="#f0f4fa" stroke="#90a8d0"/>
  <text x="658" y="336" font-size="12" fill="#2a3a7c">A:「あの、えーと…（言葉を探す）」</text>
  <text x="658" y="356" font-size="12" fill="#888">B:「"先生"のこと？」</text>
  <text x="658" y="372" font-size="12" fill="#4a7bc4">→ Aが開始し、Bが語を補って完成</text>

  <!-- Cell ③ OS: 他者開始・自己修復 (bottom-left) -->
  <rect x="140" y="402" width="458" height="261" fill="#fdf4e8"/>
  <text x="180" y="434" font-size="13" fill="#e08030">③ 他者開始・自己修復</text>
  <rect x="164" y="442" width="64" height="26" rx="4" fill="#e08030"/>
  <text x="196" y="461" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">優先③</text>

  <text x="164" y="497" font-size="13" font-weight="bold" fill="#8a4a0a">定義：</text>
  <text x="164" y="517" font-size="13" fill="#333">問題に聞き手が気づいてサインを出し、</text>
  <text x="164" y="535" font-size="13" fill="#333">問題を起こした本人が直す</text>

  <text x="164" y="572" font-size="13" font-weight="bold" fill="#8a4a0a">例：</text>
  <rect x="164" y="580" width="400" height="60" rx="6" fill="#fff8f0" stroke="#d0a870"/>
  <text x="180" y="600" font-size="12" fill="#6a3a0a">A:「山田さんが来たって」</text>
  <text x="180" y="620" font-size="12" fill="#888">B:「え？」（聞き返し＝修復開始）</text>
  <text x="180" y="636" font-size="12" fill="#e08030">A:「あ、田中さんね」→ 自己で直す</text>

  <!-- Cell ④ OO: 他者開始・他者修復 (bottom-right) - least preferred -->
  <rect x="602" y="402" width="556" height="261" fill="#fdf0f0"/>
  <text x="642" y="434" font-size="13" fill="#c0392b">④ 他者開始・他者修復</text>
  <rect x="642" y="442" width="88" height="26" rx="4" fill="#c0392b"/>
  <text x="686" y="461" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">最後の手段</text>

  <text x="642" y="497" font-size="13" font-weight="bold" fill="#8a1a1a">定義：</text>
  <text x="642" y="517" font-size="13" fill="#333">聞き手が問題に気づき、</text>
  <text x="642" y="535" font-size="13" fill="#333">聞き手自身が直してしまう</text>

  <text x="642" y="572" font-size="13" font-weight="bold" fill="#8a1a1a">例：</text>
  <rect x="642" y="580" width="490" height="60" rx="6" fill="#fff0f0" stroke="#d09090"/>
  <text x="658" y="600" font-size="12" fill="#6a1a1a">A:「それは"山田"先生が…」</text>
  <text x="658" y="620" font-size="12" fill="#888">B:「"田中"先生だよね」（直接訂正）</text>
  <text x="658" y="636" font-size="12" fill="#c0392b">→ 対人的に敏感。③が先に試みられる。</text>

  <!-- Bottom footer -->
  <rect x="0" y="676" width="1200" height="44" fill="#1a3f33"/>
  <text x="600" y="703" text-anchor="middle" font-size="14" fill="#90c4a8">優先順位：①SS ＞ ②SO ＞ ③OS ＞ ④OO ── 自己修復が優先されるのは「相手の面子を守る」ためである（Schegloff・Jefferson・Sacks, 1977）</text>
</svg>
