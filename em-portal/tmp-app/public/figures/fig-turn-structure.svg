<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">順番取りの構造（ターンテイキング）</title>
  <desc id="d">会話の順番がどのように切り替わるかを2レーンのタイムラインで示す図。TRP・重なり・自己選択・他者選択を含む。</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN',Meiryo,sans-serif; }</style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a3f33"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#f4f6f3"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="68" fill="#1a3f33"/>
  <text x="600" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#ffffff">順番取りの構造（ターンテイキング）</text>
  <text x="600" y="54" text-anchor="middle" font-size="15" fill="#90c4a8">会話はTRP（移行適切場）ごとに次の話者が決まる</text>

  <!-- Time axis -->
  <line x1="100" y1="390" x2="1140" y2="390" stroke="#aaa" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="600" y="410" text-anchor="middle" font-size="12" fill="#888">── 時間の流れ ──</text>

  <!-- Lane labels -->
  <text x="60" y="235" text-anchor="middle" font-size="18" font-weight="bold" fill="#2a6a8a">A</text>
  <text x="60" y="560" text-anchor="middle" font-size="18" font-weight="bold" fill="#8a4a2a">B</text>

  <!-- === TURN 1: A talks === -->
  <rect x="100" y="180" width="260" height="60" rx="8" fill="#c8e4f0" stroke="#2a6a8a" stroke-width="2"/>
  <text x="230" y="207" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a4a6a">「ねえ、聞いた？」</text>
  <text x="230" y="227" text-anchor="middle" font-size="11" fill="#2a6a8a">A のターン（第1ターン）</text>

  <!-- TRP marker after turn 1 -->
  <line x1="360" y1="155" x2="360" y2="420" stroke="#e67e22" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="360" y="148" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="bold">TRP①</text>
  <text x="360" y="433" text-anchor="middle" font-size="10" fill="#e67e22">移行適切場</text>

  <!-- Arrow: A selects B (other-selection) -->
  <path d="M360,240 Q400,320 400,500" stroke="#2a6a8a" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="415" y="375" font-size="11" fill="#2a6a8a">他者選択</text>
  <text x="415" y="390" font-size="10" fill="#888">(A→B指定)</text>

  <!-- === TURN 2: B talks === -->
  <rect x="400" y="500" width="220" height="60" rx="8" fill="#f0d8c8" stroke="#8a4a2a" stroke-width="2"/>
  <text x="510" y="527" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a2a0a">「何が？」</text>
  <text x="510" y="547" text-anchor="middle" font-size="11" fill="#8a4a2a">B のターン（第2ターン）</text>

  <!-- TRP marker after turn 2 -->
  <line x1="620" y1="470" x2="620" y2="580" stroke="#e67e22" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="620" y="462" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="bold">TRP②</text>

  <!-- Self-selection: A takes turn again -->
  <path d="M620,500 Q660,380 680,240" stroke="#2a6a8a" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="690" y="375" font-size="11" fill="#2a6a8a">自己選択</text>
  <text x="690" y="390" font-size="10" fill="#888">(A が再び)</text>

  <!-- === TURN 3: A talks (with overlap start) === -->
  <rect x="680" y="180" width="220" height="60" rx="8" fill="#c8e4f0" stroke="#2a6a8a" stroke-width="2"/>
  <text x="790" y="207" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a4a6a">「新しいクラスのこ[と」</text>
  <text x="790" y="227" text-anchor="middle" font-size="11" fill="#2a6a8a">A のターン（第3ターン）</text>

  <!-- Overlap bracket -->
  <line x1="870" y1="170" x2="870" y2="620" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="870" y="162" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">[重なり開始</text>

  <!-- === Overlap: B starts talking while A still talking === -->
  <rect x="870" y="500" width="200" height="60" rx="8" fill="#f0d8c8" stroke="#8a4a2a" stroke-width="2"/>
  <text x="855" y="510" font-size="20" fill="#c0392b" font-weight="bold">[</text>
  <text x="970" y="527" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a2a0a">あ、[聞いたよ！</text>
  <text x="970" y="547" text-anchor="middle" font-size="11" fill="#8a4a2a">B の割り込み（重なり）</text>

  <!-- Overlap label -->
  <rect x="840" y="420" width="180" height="34" rx="6" fill="#fdf0ec" stroke="#c0392b" stroke-width="1.5"/>
  <text x="930" y="442" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">重なり（Overlap）</text>

  <!-- End: A cuts off -->
  <line x1="1080" y1="155" x2="1080" y2="590" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1080" y="148" text-anchor="middle" font-size="11" fill="#888">A 終了</text>

  <!-- === Legend === -->
  <rect x="40" y="630" width="1120" height="72" rx="8" fill="#1a3f33"/>
  <text x="80" y="655" font-size="13" font-weight="bold" fill="#90c4a8">凡例：</text>
  <rect x="130" y="642" width="36" height="16" rx="3" fill="#c8e4f0" stroke="#2a6a8a" stroke-width="1.5"/>
  <text x="174" y="655" font-size="12" fill="#ffffff">話者A のターン</text>
  <rect x="310" y="642" width="36" height="16" rx="3" fill="#f0d8c8" stroke="#8a4a2a" stroke-width="1.5"/>
  <text x="354" y="655" font-size="12" fill="#ffffff">話者B のターン</text>
  <line x1="490" y1="650" x2="530" y2="650" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="540" y="655" font-size="12" fill="#ffffff">TRP（移行適切場）</text>
  <line x1="690" y1="650" x2="730" y2="650" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="740" y="655" font-size="12" fill="#ffffff">重なり（Overlap）</text>

  <text x="80" y="692" font-size="12" fill="#90c4a8">TRP = Transition Relevance Place：次の話者が変わることが「許される」タイミング。</text>
  <text x="80" y="708" font-size="11" fill="#668870">①他者選択（現話者が次話者を指定）→②自己選択（誰も指定されなければ自分で取る）の順で優先される。</text>
</svg>
